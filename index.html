<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Apple News+</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <div id="app">
        <div class="app-container">
            <div class="content-area">
                <div class="header">
                    <h1> News</h1>
                    <h2>{{ currentDate }}</h2>
                </div>

                <div class="feed-grid">
                    <template v-for="(news, index) in topStories" :key="news.id">
                        
                        <div v-if="news.sectionTitle" class="section-header" :class="{'trending-header': news.isTrendingSection}">
                            <h2>{{ news.sectionTitle }}</h2>
                            <p v-if="news.sectionSubtitle">{{ news.sectionSubtitle }}</p>
                        </div>

                        <div 
                            class="news-card-swipe-container" 
                            :class="'layout-' + news.layout"
                            @mousedown="handleSwipeStart($event, news.id)"
                            @touchstart="handleSwipeStart($event, news.id)"
                        >
                            <div class="swipe-actions actions-left">
                                <button class="action-btn dislike-btn" :style="{ transform: `scale(${getButtonScale(news, 'left', 0)})` }" @click.stop="onDislike(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path></svg>
                                </button>
                                <button class="action-btn like-btn" :style="{ transform: `scale(${getButtonScale(news, 'left', 1)})` }" @click.stop="onLike(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                                </button>
                            </div>

                            <div class="swipe-actions actions-right">
                                <button class="action-btn share-btn" :style="{ transform: `scale(${getButtonScale(news, 'right', 1)})` }" @click.stop="onShare(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                                </button>
                                <button class="action-btn save-btn" :style="{ transform: `scale(${getButtonScale(news, 'right', 0)})` }" @click.stop="onSave(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                                </button>
                            </div>

                            <div class="news-card" :class="['card-' + news.layout, { 'is-swiping': news.swipeState.isDragging }]" :style="{ transform: `translateX(${news.swipeState.offsetX}px)` }">
                                
                                <template v-if="news.layout === 'trending'">
                                    <div class="trending-rank">{{ news.rank }}</div>
                                    <div class="news-card-content">
                                        <div class="publisher"><span v-if="news.isAppleNewsPlus" class="news-plus">News+</span>{{ news.publisher }}</div>
                                        <h3 class="headline">{{ news.title }}</h3>
                                        <div class="meta"><span>{{ news.time }} · {{ news.authors }}</span><span>•••</span></div>
                                    </div>
                                </template>

                                <template v-else>
                                    <div class="news-card-image" v-if="news.image" :style="{ backgroundImage: 'url(' + news.image + ')' }"></div>
                                    <div class="news-card-content">
                                        <div class="publisher"><span v-if="news.isAppleNewsPlus" class="news-plus">News+</span>{{ news.publisher }}</div>
                                        <h3 class="headline">{{ news.title }}</h3>
                                        <div class="meta"><span>{{ news.time }} · {{ news.authors }}</span><span>•••</span></div>
                                    </div>
                                </template>

                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="bottom-nav">
                <div v-for="tab in tabs" :key="tab.id" class="nav-item" :class="{ active: currentTab === tab.id }" @click="currentTab = tab.id">
                    <div class="icon" :style="getIconStyle(tab.iconShape)"></div>
                    <span>{{ tab.name }}</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
