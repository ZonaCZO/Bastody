<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Apple News+</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <div id="app">
        <div class="app-container">
            
            <div class="content-area">
                <div class="header-top">
                    <div class="header-titles">
                        <h1>
                            <svg class="apple-logo-img" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                            News
                        </h1>
                        <h2>{{ currentDate }}</h2>
                    </div>
                    <button class="try-free-btn">Try News+ Free</button>
                </div>

                <div class="topics-nav">
                    <div class="topic-pill" v-for="topic in topics" :key="topic.name">
                        <span class="topic-icon" v-html="topic.icon"></span>
                        {{ topic.name }}
                    </div>
                </div>

                <div class="feed-grid">
                    <template v-for="(news, index) in topStories" :key="news.id">
                        
                        <div v-if="news.sectionTitle" class="section-header" :class="{'trending-header': news.isTrendingSection}">
                            <div class="section-title-wrap">
                                <h2 :style="(news.isSubHeader ? 'font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-top: 10px; ' : '') + (news.sectionTitle === 'Top Stories' ? 'color: var(--apple-red);' : (news.sectionTitle === 'For You' && !news.isSubHeader) ? 'color: var(--apple-green);' : '')">{{ news.sectionTitle }}</h2>
                                <p v-if="news.sectionSubtitle">{{ news.sectionSubtitle }}</p>
                            </div>
                            <div class="section-actions" v-if="!news.isSubHeader">
                                <button v-if="!['For You', 'Top Stories', 'Food', 'Sports', 'Trending Stories', 'Latest Puzzles'].includes(news.sectionTitle)" class="section-add-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                                <button v-if="!['Top Stories', 'For You'].includes(news.sectionTitle)" class="section-more-btn">•••</button>
                            </div>
                        </div>

                        <div v-if="news.layout === 'hidden'" style="display: none;"></div>

                        <div v-else-if="news.layout === 'recipe-hero'" class="card-recipe-hero-block">
                            <div class="recipe-hero-visual" :style="{ backgroundImage: 'url(' + news.image + ')' }">
                                <div class="recipe-hero-blur-overlay"></div>
                                <div class="recipe-hero-overlay">
                                    <div class="recipe-hero-publisher">
                                        <span v-html="news.publisher"></span>
                                        <div class="recipe-hero-label">RECIPE</div>
                                    </div>
                                    <div class="recipe-hero-save">
                                        <svg viewBox="0 0 13.5254 20.9863" style="width: 11px; height: 17px; fill: white;">
                                            <path d="M1.03516 20.9473C1.51367 20.9473 1.79688 20.6738 2.67578 19.8242L6.49414 16.0645C6.54297 16.0156 6.63086 16.0156 6.66992 16.0645L10.4883 19.8242C11.3672 20.6738 11.6504 20.9473 12.1289 20.9473C12.7832 20.9473 13.1641 20.5176 13.1641 19.7559L13.1641 2.80273C13.1641 0.947266 12.2363 0 10.4004 0L2.76367 0C0.927734 0 0 0.947266 0 2.80273L0 19.7559C0 20.5176 0.380859 20.9473 1.03516 20.9473Z" />
                                        </svg>
                                    </div>
                                </div>
                                <div class="recipe-hero-image-inner" :style="{ backgroundImage: 'url(' + news.image + ')' }"></div>
                            </div>
                            <div class="recipe-hero-info">
                                <h3 class="recipe-hero-title">{{ news.title }}</h3>
                                <p class="recipe-hero-desc" v-if="news.description">{{ news.description }}</p>
                                <div class="recipe-hero-meta">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    {{ news.time }}
                                </div>
                            </div>
                        </div>

                        <div v-else-if="news.layout === 'ad'" class="card-ad">
                            <div class="ad-top-bar" v-if="news.adBannerText">{{ news.adBannerText }}</div>
                            <div class="ad-main" :style="{ backgroundImage: 'url(' + news.image + ')' }">
                                <h2 class="ad-title" v-html="news.title"></h2>
                                <div class="ad-controls">
                                    <div class="ad-logo-wrap" v-html="news.logoText"></div>
                                    <button class="ad-btn">{{ news.buttonText }}</button>
                                </div>
                                <p class="ad-disclaimer">{{ news.disclaimer }}</p>
                                <div class="ad-badge">Ad</div>
                            </div>
                        </div>

                        <div v-else-if="news.layout === 'recipe-carousel'" class="recipe-carousel">
    <div class="recipe-carousel__wrapper">
        <div class="recipe-carousel__scroll">
            <div class="recipe-card" v-for="card in news.cards" :key="card.id">
                <div class="recipe-card__image-wrap" :style="{ backgroundImage: 'url(' + card.image + ')' }">
                    <div class="recipe-card__gradient" :style="{ backgroundColor: card.bgColor || 'rgba(0,0,0,0.6)' }"></div>
                    <div class="recipe-card__overlay">
                        <div class="recipe-card__publisher">
                            <span v-html="card.publisher"></span>
                            <div class="recipe-card__label">RECIPE</div>
                        </div>
                        <svg class="recipe-card__icon" style="fill: white; stroke: none;" viewBox="0 0 16.7871 20.9473">
                            <g>
                                <path d="M0 17.8809C0 19.9219 1.00586 20.9375 3.02734 20.9375L13.3984 20.9375C15.4199 20.9375 16.4258 19.9219 16.4258 17.8809L16.4258 3.06641C16.4258 1.03516 15.4199 0 13.3984 0L3.02734 0C1.00586 0 0 1.03516 0 3.06641ZM1.57227 17.8516L1.57227 3.0957C1.57227 2.11914 2.08984 1.57227 3.10547 1.57227L13.3203 1.57227C14.3359 1.57227 14.8535 2.11914 14.8535 3.0957L14.8535 17.8516C14.8535 18.8281 14.3359 19.3652 13.3203 19.3652L3.10547 19.3652C2.08984 19.3652 1.57227 18.8281 1.57227 17.8516Z"/>
                                <path d="M4.51172 5.6543L11.9238 5.6543C12.2656 5.6543 12.5195 5.39062 12.5195 5.04883C12.5195 4.7168 12.2656 4.45312 11.9238 4.45312L4.51172 4.45312C4.16016 4.45312 3.90625 4.7168 3.90625 5.04883C3.90625 5.39062 4.16016 5.6543 4.51172 5.6543Z"/>
                                <path d="M4.51172 9.0625L11.9238 9.0625C12.2656 9.0625 12.5195 8.79883 12.5195 8.45703C12.5195 8.125 12.2656 7.86133 11.9238 7.86133L4.51172 7.86133C4.16016 7.86133 3.90625 8.125 3.90625 8.45703C3.90625 8.79883 4.16016 9.0625 4.51172 9.0625Z"/>
                                <path d="M4.51172 12.4707L8.01758 12.4707C8.36914 12.4707 8.62305 12.2168 8.62305 11.8848C8.62305 11.5332 8.36914 11.2695 8.01758 11.2695L4.51172 11.2695C4.16016 11.2695 3.90625 11.5332 3.90625 11.8848C3.90625 12.2168 4.16016 12.4707 4.51172 12.4707Z"/>
                            </g>
                        </svg>
                    </div>
                </div>
                <div class="recipe-card__info">
                    <h3 class="recipe-card__title">{{ card.title }}</h3>
                    <div class="recipe-card__time">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        {{ card.time }}
                    </div>
                    <div v-if="card.isAppleNewsPlus" class="news-plus-logo-small">
                        <svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                        News+
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="recipe-menu">
        <div class="recipe-menu__item" v-for="link in news.links" :key="link.text">
            <div class="recipe-menu__left">
                <span class="recipe-menu__icon" v-html="link.icon"></span>
                <span class="recipe-menu__text">{{ link.text }}</span>
            </div>
            <svg class="recipe-menu__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>
    </div>
    
    <div class="recipe-menu__more-link" v-if="news.moreText">
        {{ news.moreText }}
    </div>
</div>

                        <div v-else-if="news.layout === 'puzzles-block'" class="puzzles">
                            <div class="puzzles__list">
                                <template v-for="puzzle in news.puzzles" :key="puzzle.id">
            
                                    <div v-if="puzzle.type === 'hero'" class="news-card puzzle-card puzzle-card--hero">
                                        <div class="puzzle-card__image" :style="{ backgroundImage: 'url(' + puzzle.image + ')' }"></div>
                                        <div class="puzzle-card__content">
                                            <div class="puzzle-card__label">
                                                <span class="news-plus-red"><svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>News+</span> 
                                                <span class="puzzle-card__game-name">{{ puzzle.gameName }}</span>
                                            </div>
                                            <h3 class="puzzle-card__title">{{ puzzle.title }}</h3>
                                            <div class="puzzle-card__bottom">
                                                <div class="puzzle-card__author" v-if="puzzle.author">{{ puzzle.author }}</div>
                                                <div class="puzzle-card__spacer" v-else></div>
                                                <button class="puzzle-card__more-btn">•••</button>
                                            </div>
                                        </div>
                                    </div>

            <div v-if="puzzle.type === 'list'" class="news-card puzzle-card puzzle-card--list">
                <div class="puzzle-card__icon" :style="{ backgroundColor: puzzle.iconColor }" v-html="puzzle.iconSvg"></div>
                <div class="puzzle-card__content">
                    <div class="puzzle-card__label">
                        <span class="news-plus-red"><svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>News+</span> 
                        <span class="puzzle-card__game-name">{{ puzzle.gameName }}</span>
                    </div>
                    <h3 class="puzzle-card__title">{{ puzzle.title }}</h3>
                    <div class="puzzle-card__subtitle" v-if="puzzle.subtitle">{{ puzzle.subtitle }}</div>
                    <div class="puzzle-card__difficulty" v-if="puzzle.difficulty">{{ puzzle.difficulty }}</div>
                    <div class="puzzle-card__bottom">
                        <div class="puzzle-card__author" v-if="puzzle.author">{{ puzzle.author }}</div>
                        <div class="puzzle-card__action-text" v-else-if="puzzle.actionText">{{ puzzle.actionText }}</div>
                        <div class="puzzle-card__spacer" v-else></div>
                        <button class="puzzle-card__more-btn">•••</button>
                    </div>
                </div>
            </div>

        </template>
    </div>
    <div class="puzzles__more-link">More Puzzles ></div>
</div>

                        <div v-else-if="news.layout === 'sports-scores'" class="card-sports-scores">
                            <div class="sports-teams-circles">
                                <div class="team-circle" v-for="team in news.teams" :key="team.id" :class="{'team-circle-large': team.isCenter}" :style="{ backgroundColor: team.bgColor }">
                                    <img :src="team.logo" alt="team logo" />
                                </div>
                            </div>
                            <button class="pick-teams-btn">{{ news.buttonText }}</button>
                            <div class="sports-scores-grid">
                                <div class="score-column" v-for="score in news.scores" :key="score.league">
                                    <div class="score-league">{{ score.league }}</div>
                                    <div class="score-team">
                                        <span class="score-team__icon" v-html="score.team1.icon"></span>
                                        <span class="score-team__name">{{ score.team1.name }}</span>
                                        <span class="score-team__record" v-if="score.team1.score">{{ score.team1.score }}</span>
                                    </div>
                                    <div class="score-team">
                                        <span class="score-team__icon" v-html="score.team2.icon"></span>
                                        <span class="score-team__name">{{ score.team2.name }}</span>
                                        <span class="score-team__record" v-if="score.team2.score">{{ score.team2.score }}</span>
                                    </div>
                                    <div class="score-time">{{ score.time }}</div>
                                </div>
                            </div>
                        </div>

                        <div v-else class="news-card-swipe-container" :class="'layout-' + news.layout" @mousedown="handleSwipeStart($event, news.id)" @touchstart="handleSwipeStart($event, news.id)">
                            
                            <div v-if="!news.disableSwipe" class="swipe-actions actions-left">
                                <button class="action-btn dislike-btn" :style="getButtonStyle(news, 'left', 0)" @click.stop="onDislike(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path></svg>
                                </button>
                                <button class="action-btn like-btn" :style="getButtonStyle(news, 'left', 1)" @click.stop="onLike(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                                </button>
                            </div>

                            <div v-if="!news.disableSwipe" class="swipe-actions actions-right">
                                <button class="action-btn share-btn" :style="getButtonStyle(news, 'right', 1)" @click.stop="onShare(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                                </button>
                                <button class="action-btn save-btn" :style="getButtonStyle(news, 'right', 0)" @click.stop="onSave(news.id)">
                                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                                </button>
                            </div>

                            <div class="swipe-surface" :class="{ 'is-swiping': news.swipeState && news.swipeState.isDragging, 'grid-row-surface': news.layout === 'grid-row' }" :style="news.layout === 'grid-row' || news.disableSwipe ? {} : { transform: `translateX(${news.swipeState.offsetX}px)` }">
                                
                                <template v-if="news.layout === 'grid-row'">
                                    <div class="news-card card-grid-half" v-for="(card, index) in news.cards" :key="card.id" :class="{ 'is-swiping': news.swipeState && news.swipeState.isDragging, 'card-recipe': card.type === 'recipe' }" :style="getGridCardStyle(news, index)">
                                        <template v-if="card.type === 'recipe'">
                                            <div class="recipe-image-wrap" :style="{ backgroundImage: 'url(' + card.image + ')' }">
                                                <div class="recipe-overlay">
                                                    <div class="recipe-overlay-text">
                                                        <span class="recipe-publisher" v-html="card.publisher"></span>
                                                        <span class="recipe-label">RECIPE</span>
                                                    </div>
                                                    <svg class="recipe-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M10 18v-5M10 13a2 2 0 1 1 4 0v5"></path></svg>
                                                </div>
                                            </div>
                                            <div class="recipe-content">
                                                <h3 class="recipe-title">{{ card.title }}</h3>
                                                <div class="recipe-meta">
                                                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                                    <span>{{ card.time }}</span>
                                                </div>
                                            </div>
                                        </template>

                                        <template v-else>
                                            <div class="news-card-image" v-if="card.image" :style="{ backgroundImage: 'url(' + card.image + ')' }"></div>
                                            <div class="news-card-content">
                                                <div class="publisher">
                                                    <span v-html="card.publisher"></span>
                                                </div>
                                                <h3 class="headline">{{ card.title }}</h3>
                                                <div class="meta">
    <span>
        {{ news.time }}
        <template v-if="news.authors"> · {{ news.authors }}</template>
    </span>
    <span class="card-more-btn">•••</span>
</div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <template v-else>
                                    <div class="news-card" :class="'card-' + news.layout">
                                        <div v-if="news.hasNewsPlusHeader" class="news-plus-header">
                                            <svg viewBox="0 0 384 512" style="width: 14px; height: 14px; fill: currentColor; margin-right: 3px; margin-bottom: 2px;">
                                                <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                                            </svg>
                                            News+
                                        </div>

                                        <div v-if="news.layout === 'list'" class="list-layout-inner">
                                            <div class="news-card-image" v-if="news.image" :style="{ backgroundImage: 'url(' + news.image + ')' }"></div>
                                            <div class="news-card-content">
                                                <div class="publisher">
                                                    <span v-if="news.isAppleNewsPlus && !news.hasNewsPlusHeader" class="news-plus">
                                                        <svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                                                        News+
                                                    </span>
                                                    <span v-html="news.publisher"></span>
                                                </div>
                                                <h3 class="headline">{{ news.title }}</h3>
                                                <div class="meta">
    <span>
        {{ news.time }}
        <template v-if="news.authors"> · {{ news.authors }}</template>
    </span>
    <span class="card-more-btn">•••</span>
</div>
                                            </div>
                                        </div>

                                        <template v-else>
                                            <div class="news-card-image" v-if="news.image" :style="{ backgroundImage: 'url(' + news.image + ')' }"></div>
                                            <div v-if="news.layout === 'trending'" class="trending-rank" :class="'rank-' + news.rank">{{ news.rank }}</div>
                                            <div class="news-card-content">
                                                <div class="publisher">
                                                    <span v-if="news.isAppleNewsPlus && !news.hasNewsPlusHeader" class="news-plus">
                                                        <svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                                                        News+
                                                    </span>
                                                    <span v-html="news.publisher"></span>
                                                </div>
                                                <h3 class="headline">{{ news.title }}</h3>
                                               <div class="meta">
    <span>
        {{ news.time }}
        <template v-if="news.authors"> · {{ news.authors }}</template>
    </span>
    <span class="card-more-btn">•••</span>
</div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="floating-nav-wrapper">
                <div class="bottom-nav-pill">
                    <div v-for="tab in tabs" :key="tab.id" class="nav-item" :class="{ active: currentTab === tab.id }" @click="currentTab = tab.id">
                        <div class="icon" :style="getIconStyle(tab.svg)"></div>
                        <span>{{ tab.name }}</span>
                    </div>
                </div>
                <div class="search-fab">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
