<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple News+ Vue Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <div id="app">
        <div class="iphone-mockup">
            
            <div class="dynamic-island"></div>
            
            <div class="status-bar">
                <span class="time">{{ currentTime }}</span>
                <span class="icons">📶 🛜 🔋</span>
            </div>

            <div class="content-area">
                <div class="header">
                    <h1> News</h1>
                    <h2>{{ currentDate }}</h2>
                </div>

                <div class="top-stories-title">Top Stories</div>
				

                <div class="news-card" v-for="news in topStories" :key="news.id">
                    <div class="news-card-image">
                        <div :style="{ backgroundImage: 'url(' + news.image1 + ')' }"></div>
                        <div :style="{ backgroundImage: 'url(' + news.image2 + ')' }"></div>
                    </div>
                    <div class="news-card-content">
                        <div class="publisher">
                            <span style="color: red;">✿</span> {{ news.publisher }}
                        </div>
                        <h3 class="headline">{{ news.title }}</h3>
                        <div class="meta">
                            <span>{{ news.time }} · {{ news.authors }}</span>
                            <span>•••</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div 
                    v-for="tab in tabs" 
                    :key="tab.id"
                    class="nav-item" 
                    :class="{ active: currentTab === tab.id }"
                    @click="currentTab = tab.id"
                >
                    <div class="icon" :style="getIconStyle(tab.iconShape)"></div>
                    <span>{{ tab.name }}</span>
                </div>
            </div>

            <div class="home-indicator"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
